<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente premium -->
    <linearGradient id="premiumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0052A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D7A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente de brilho -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    
    <!-- Sombra suave -->
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Símbolo T com Runa Fehu -->
  <g filter="url(#softShadow)">
    <!-- Letra T -->
    <path d="M 8 12 L 38 12 L 38 18 L 28 18 L 28 48 L 18 48 L 18 18 L 8 18 Z" 
          fill="url(#premiumGradient)"/>
    
    <!-- Runa Fehu (ᚠ) integrada -->
    <g opacity="0.7">
      <rect x="32" y="22" width="2" height="18" fill="url(#premiumGradient)"/>
      <path d="M 33 24 L 33 26 L 40 23 L 40 21 Z" fill="url(#premiumGradient)"/>
      <path d="M 33 32 L 33 34 L 40 31 L 40 29 Z" fill="url(#premiumGradient)"/>
    </g>
    
    <!-- Brilho sutil -->
    <rect x="8" y="12" width="30" height="4" fill="url(#shineGradient)" opacity="0.3"/>
  </g>
  
  <!-- Texto THIESSE -->
  <g filter="url(#softShadow)">
    <text x="52" y="38" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="26" 
          font-weight="700" 
          fill="url(#premiumGradient)" 
          letter-spacing="2">
      THIESSE
    </text>
  </g>
  
  <!-- Subtitle softwares (opcional, pode ser removido se ficar pequeno) -->
  <text x="52" y="52" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="9" 
        font-weight="300" 
        fill="url(#premiumGradient)" 
        letter-spacing="3"
        opacity="0.7">
    SOFTWARES
  </text>
</svg>